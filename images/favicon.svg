<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Círculo exterior teal (cuerpo del anillo) -->
  <circle cx="44" cy="50" r="44" fill="#00A8B0"/>
  <!-- Arco blanco interior (contraforma de la "a") -->
  <ellipse cx="44" cy="43" rx="25" ry="29" fill="white"/>
  <!-- Barra derecha que cierra la "a" -->
  <rect x="80" y="6" width="18" height="88" rx="9" fill="#00A8B0"/>
  <!-- Cubre el fondo del arco blanco para crear el cierre inferior -->
  <rect x="19" y="69" width="61" height="25" fill="#00A8B0"/>
  <ellipse cx="44" cy="69" rx="25" ry="6" fill="#00A8B0"/>
</svg>
